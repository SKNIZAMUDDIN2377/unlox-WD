<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>loops</title>
</head>
<body>
  //++  increment/invrease value by 1
  //--   decrement/decrease value by 1

  //task to print number 1-10 in console
  <script>
     //1 .for .loops
     //syntax: for(strat point;      ending/condition  ;  increment/decriment)
    // task print 1-10 no in for loops
    //when we start the loop we should stop the loop

    for(let i = 1 ; i<=10 ; i++ ){
      console.log("value is ",i)

    }
    for(let j=10;j>=1;j--){
      console.log(j)
    }

    //2 . while-loop - entry controlled loop

    // if the cond is true you can enter the while loop if false no

    //syntax 
    // while(condition) {
    //}
    //when the cond false while loop false 

    let count=1
    while(count <=5){
      console.log("hello")
      count++
    }

    //3 . do-while loop - exit control loop
    //it will execute ur code atleast  for 1 time doesnt mattter if ur cond id true or false

    let num=7
    do{
      console.log(" hii do while")
    }while(num <5)

  </script>

  
</body>
</html>
