<html lang="en">
<head>

  <title>Document</title>
  <style>
    div{
      background-color: beige;
     width: 400px;
      text-align: center;
      border-radius: 3cm;
      border-color: black;
      border: 3px solid;
      padding-top: 5px;
      margin-top: 11px;
      box-shadow: 0 4px black;
    }
    img{
      border-radius: 3cm;
      object-fit: cover;
      width: 400px;
    }
    h2,
    p,
    button{
      color: black;
      font-family: fantasy;
    }
    button{
      padding-top: 12px;
      text-align: top;
      background-color: rgb(223, 148, 148);
      color: rgb(255, 255, 255);
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
 <div>
   <img src="coffee.jpg" >
  <h2>coffee</h2>
  <p> best to health</p>
  <button> buy now</button>

 </div>
</body>
</html>
