<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Day3 table</title>
</head>
<body>
   <!-- to create table we use table tag tr=table row and th=table heading
  here -->

    <tr> 
      <th>
        roll no

      <th>
        name

    </tr>

    <tr>
      <td>
        2
      </td>
      <td>john</td>

    </tr>

    <tr></tr>

  </table>
</body>
</html>
