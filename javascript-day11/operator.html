<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>operator s</title>
</head>
<body>
   <!-- //1. arthmetic operator - basic maths  -->

   <script>
    var a = 30
    var b =60

    console.log(a-b)
    console.log(a+b)
    console.log(a/b)
    console.log(a%b) //%-modulo the reminder


    //2) assignment ope - to assign a value we need = (equal to)

     var x= 10
     // assigning and operations together 

     console.log(x=x+5)
     console.log(x=x-5)
     console.log(x*=2)

     //3) comparision operator

     var p = 20
     var q = 20

     console.log(p>q) // false
     console.log(p==q) //true

     var abc=100
     var pqr=20

     console.log(abc >= pqr) //true

     const  height = 12
     const height1=  33
     //check the value not data type ==
     console.log(height1==height)

     //=== checks value and also data type
     console.log(height1===height)




     //4) logical operator - AND , OR , NEGATION
     // and-&& - if both cond is true then only output is true

    var ismem = true
    var total = 500

    console.log(  ismem && total >500  )

    //or- || - only one cond is true

    var jiohotstar = true
    var freeaccess=false
    console.log( "can watch ipl" ,jiohotstar || freeaccess)
    //negation-! give opposite value 

    let net=false
    
    console.log("amount" , !net) //!net

    
   </script>

</body>
