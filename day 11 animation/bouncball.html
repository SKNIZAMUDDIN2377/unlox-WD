<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .ball{
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background-color: red;
   animation : bounce 1s infinite ease-in-out;    /* ease in out for smooth animation */
    }
    @keyframes bounce{
      0% {transform: translateY(0);}
      50%{transform:translateY(100px)}

      100%{transform:transformY(0)}
    }
  </style>
</head>
<body>
  <div class="ball">

  </div>
</body>
</html>
