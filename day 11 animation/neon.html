<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    h1{
      
      color: aqua;
      animation: glow 1s infinite;
    }
    @keyframes glow{
      from{
        color: aqua;
        text-shadow: 0 0 5px red;


      }
      to{
        color: rgb(83, 215, 13);
        text-shadow: 0 0 5px rgb(245, 241, 241);
        margin-top: 200px;
      }
    }
  </style>
</head>
<body>
  <h1>
    neon text glow
  </h1>
</body>
</html>
