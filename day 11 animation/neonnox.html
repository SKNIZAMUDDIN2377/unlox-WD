<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .box{
       border: 2px solid red;
       color: beige;
       width: 50px;
       height: 50px;
       animation: boxx 3s infinite;
       box-shadow: 0 0 6px yellow;
    }
    @keyframes boxx{
      from{
        width: 50px;
       height: 50px;
       box-shadow: 0 0 6px yellow;
      }

      to{
         width:100px;
        height: 100px;
        box-shadow: 0 0 6px rgb(89, 219, 8);
      }
    }
  </style>
</head>
<body>
  <div class="box" >
     
  </div>
    
</body>
</html>
