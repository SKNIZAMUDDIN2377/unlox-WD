<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    body{
      background-image: url(human.png);
      background-repeat: no-repeat;
      background-size: 400px;
    }
    .bal{

      width: 50px;
      height: 60px;
      border-radius: 50%;    
      background-color: black;
     animation: ball 1s infinite;
     border: 2px solid red;
     margin-left: 320px;
     margin-top: 370px;
    
    }
    p{
      color: aliceblue;
      text-align: center;
    }
    .load{
      width: 60px;
      height: 60px;
      border: 2px soild grey;
      border-radius: 50%;
      border-top: 2px dotted red;
      animation: loading 3s infinite;
    }
    .image{
      height: 500px;
    }
    @keyframes ball{
      0%{ transform: translateY(6px);}

      50%{ transform: translatey(100px);}

      70%{
        transform: translateY(80px);
      }
    }
    @keyframes loading{
      from{rotate: 0;  }
      from{border-top:2px dotted red}

      to{rotate: 360deg;  }
      to{border-top: 2px dotted green; }
    }
  </style>
</head>
<body>
  <div class="bal">
      <p>hello</p>
  </div>
    <br>

  <div class="load">

  </div>
  <!-- <img class="image" src="human.png" > -->
</body>
</html>
