   const ab = document.getElementById("text")

   //what ever we write after = in " " - that is we are assigning a new value
     

     const buttton = document.getElementsByTagName("button")

      boo.textContent="hell"

       const bbn = document.getElementsByClassName("byee")

         bbn.textContent=""
