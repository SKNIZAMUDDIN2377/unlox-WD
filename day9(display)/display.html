<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>display properties</title>
  <style>
    p{
      display: block ;
      background-color: beige;

    }
    h1{
      display:inline;
      background-color: bisque;
    }

  </style>
</head>
<body>
  <h1>display properties</h1>
  <hr>
  <h1>display:none</h1>
  <p>it will display none</p>
  
  <h1>display:block</h1>
  <p>element take 100% space</p>

  <h1>display:inline-block</h1>
  <p>as per the content it take space</p>
  <div>
    <p>hello</p>
  </div>
</body>
</html>
